name: Self-Hosted Test

on:
  workflow_dispatch:
  push:
    branches: [ fix-android-crash-and-wasm-dates ]
    paths:
      - 'android/**'
      - 'brain/**'

jobs:
  test-on-self-hosted:
    name: Test on macOS ARM64 Self-Hosted
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1

      - name: Compile WASM Brain
        run: |
          cd brain
          cargo build --target wasm32-wasip1 --release
          mkdir -p ../android/app/src/main/assets
          cp target/wasm32-wasip1/release/time_tracker_brain.wasm ../android/app/src/main/assets/brain.wasm

      - name: Assemble Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Run Rust Tests
        run: cd brain && cargo test --target wasm32-wasip1 --release

      - name: Run Rust Unit Tests (native)
        run: cd brain && cargo test --lib