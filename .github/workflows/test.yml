name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-brain:
    name: Rust WASM Brain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1

      - name: Run Brain Tests
        run: cd brain && cargo test

  android-host:
    name: Android Host
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Build WASM first because android build needs assets/brain.wasm
      - name: Install Rust (for Brain build)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1

      - name: Compile WASM Brain
        run: |
          cd brain
          cargo build --target wasm32-wasip1 --release
          mkdir -p ../android/app/src/main/assets
          cp target/wasm32-wasip1/release/time_tracker_brain.wasm ../android/app/src/main/assets/brain.wasm

      - name: Run Android Unit Tests
        run: cd android && ./gradlew test --no-daemon

      - name: Assemble Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon