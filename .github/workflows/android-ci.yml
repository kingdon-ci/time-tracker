name: Android CI

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'brain/**'
      - 'Makefile'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'brain/**'
      - 'Makefile'
      - '.github/workflows/android-ci.yml'

jobs:
  rust-test:
    name: Rust WASM Brain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1

      - name: Run Brain Tests
        run: cd brain && cargo test

  android-test:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1

      - name: Compile WASM Brain
        run: |
          cd brain
          cargo build --target wasm32-wasip1 --release
          mkdir -p ../android/app/src/main/assets
          cp target/wasm32-wasip1/release/time_tracker_brain.wasm ../android/app/src/main/assets/brain.wasm

      - name: Run Android Unit Tests
        run: cd android && ./gradlew test --no-daemon
